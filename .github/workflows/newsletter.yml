name: Daily AI Newsletter

on:
  schedule:
    # รันทุกวันจันทร์-ศุกร์ เวลา 19:30 น. (เวลาไทย คือ 12:30 UTC)
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # ปุ่มกดรันเองเพื่อทดสอบ

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
